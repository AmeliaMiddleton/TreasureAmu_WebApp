<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="lensSheen" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#e8a85a" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#e8a85a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Network nodes (3 corners — echoing the GeekAmu connected-dots motif) ── -->
  <circle cx="10" cy="12" r="2.8" fill="#e8a85a" opacity="0.85"/>
  <circle cx="54" cy="13" r="2.3" fill="#c8813a" opacity="0.75"/>
  <circle cx="9"  cy="50" r="1.8" fill="#e8a85a" opacity="0.65"/>

  <!-- Connector lines from nodes to magnifying glass edge -->
  <line x1="10" y1="12" x2="16" y2="17" stroke="#e8a85a" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
  <line x1="54" y1="13" x2="42" y2="17" stroke="#c8813a" stroke-width="1.2" stroke-linecap="round" opacity="0.50"/>
  <line x1="9"  y1="50" x2="15" y2="42" stroke="#e8a85a" stroke-width="1.0" stroke-linecap="round" opacity="0.40"/>

  <!-- ── Magnifying glass lens ── -->
  <!-- Subtle inner sheen so the lens reads as glass -->
  <circle cx="28" cy="27" r="15" fill="url(#lensSheen)"/>
  <!-- Lens ring — amber accent fill -->
  <circle cx="28" cy="27" r="15" fill="none" stroke="#c8813a" stroke-width="2.6"/>

  <!-- ── Faceted diamond gem (fits inside the lens) ──
       Vertices: top(28,15)  left(16,27)  bottom(28,39)  right(40,27)
       All 4 points sit inside the lens circle (center 28,27 r=15). -->

  <!-- Upper-left crown — warm gold (lit face) -->
  <polygon points="28,15 16,27 28,27" fill="#e8a85a"/>
  <!-- Upper-right crown — mid amber (slight shadow) -->
  <polygon points="28,15 28,27 40,27" fill="#d08030"/>
  <!-- Lower-left pavilion — dark amber (deep shadow) -->
  <polygon points="16,27 28,27 28,39" fill="#8a4818"/>
  <!-- Lower-right pavilion — deepest shadow -->
  <polygon points="28,27 40,27 28,39" fill="#5a2e0c"/>

  <!-- Table facet — bright highlight triangle at the crown top -->
  <polygon points="23,21 33,21 28,15" fill="#faf0d8" opacity="0.88"/>

  <!-- Gem outline — thin gold stroke to unify the shape -->
  <polygon points="28,15 40,27 28,39 16,27" fill="none" stroke="#e8a85a" stroke-width="0.8" opacity="0.60"/>

  <!-- ── 4-pointed sparkle at the gem's top vertex ── -->
  <line x1="28" y1="13" x2="28" y2="17" stroke="#fffbe8" stroke-width="1.3" stroke-linecap="round" opacity="0.92"/>
  <line x1="26" y1="15" x2="30" y2="15" stroke="#fffbe8" stroke-width="1.3" stroke-linecap="round" opacity="0.92"/>
  <line x1="26.6" y1="13.6" x2="29.4" y2="16.4" stroke="#fffbe8" stroke-width="0.7" stroke-linecap="round" opacity="0.60"/>
  <line x1="29.4" y1="13.6" x2="26.6" y2="16.4" stroke="#fffbe8" stroke-width="0.7" stroke-linecap="round" opacity="0.60"/>

  <!-- ── Magnifying glass handle ── -->
  <line x1="39" y1="38" x2="48" y2="47" stroke="#c8813a" stroke-width="3.6" stroke-linecap="round"/>
  <circle cx="48.5" cy="47.5" r="1.8" fill="#8a4818"/>
</svg>
